<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Full Tests</title>
</head>
<body>
  <script type="module">
    const failures = []

    try {
      await import('./browser-full-runner-main.mjs')
    } catch (error) {
      failures.push({
        title: 'browser-full-runner bootstrap',
        error: error?.stack || error?.message || String(error)
      })
    } finally {
      // ランナー本体が結果を設定できなかった場合でも、必ず完了シグナルを返す
      if (window.__playwright_done__ === undefined) {
        if (failures.length === 0) {
          failures.push({
            title: 'browser-full-runner bootstrap',
            error: 'window.__playwright_done__ が未設定のまま終了しました。'
          })
        }
        window.__playwright_done__ = {
          failures: failures.length,
          passes: 0,
          total: failures.length,
          failures_detail: failures
        }
      }
    }
  </script>
</body>
</html>
